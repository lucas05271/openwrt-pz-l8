# GitHub Actions workflow for building OpenWrt firmware for CMCC PZ-L8
name: Build OpenWrt for CMCC PZ-L8

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE: cmcc_pz-l8
  PR_21495_SHA: d4286eec1828e4843bceaccc400846854fa46955
  BDF_COMMIT: f7ad5fee1924efdb5d8b2d1bf95bd3867d22e701

jobs:
  build:
    name: Build ${{ matrix.mode }}
    runs-on: ubuntu-22.04
    timeout-minutes: 720
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: AP
            mode_lower: ap
          - mode: Router
            mode_lower: router

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: main
          path: openwrt
          fetch-depth: 0

      - name: Inject Local Plugins
        working-directory: openwrt/package
        run: |
          cp -r $GITHUB_WORKSPACE/podkop . 2>/dev/null || true
          echo "=== 插件源码已注入 ==="

      - name: "Merge PR #21495 and fix caldata"
        working-directory: openwrt
        run: |
          git config user.email "builder@github.com"
          git config user.name "GitHub Actions"
          git fetch origin ${{ env.PR_21495_SHA }}
          if ! git merge FETCH_HEAD --no-edit; then
            CALDATA=target/linux/qualcommax/ipq50xx/base-files/etc/hotplug.d/firmware/11-ath11k-caldata
            git checkout --ours "$CALDATA"
            git add "$CALDATA"
            git commit --no-edit --no-verify || true
          fi
          chmod +x "$GITHUB_WORKSPACE/.github/scripts/fix-caldata.sh"
          "$GITHUB_WORKSPACE/.github/scripts/fix-caldata.sh" "target/linux/qualcommax/ipq50xx/base-files/etc/hotplug.d/firmware/11-ath11k-caldata"

      - name: "Add FM25LS01 SPI NAND support"
        working-directory: openwrt
        run: |
          PATCH_DIR=target/linux/generic/backport-6.12
          PATCH_SRC="$GITHUB_WORKSPACE/patches/add-fm25ls01-support.patch"
          if [ -f "$PATCH_SRC" ]; then
            cp "$PATCH_SRC" "$PATCH_DIR/440-v6.12-mtd-spinand-add-support-for-FudanMicro-FM25LS01.patch"
          fi

      # 动态生成出厂配置（完美规避 Windows 换行符导致的变砖死机）
      - name: Inject Dynamic Factory Defaults
        working-directory: openwrt
        run: |
          echo "=== 动态注入出厂配置 ==="
          mkdir -p files/etc/uci-defaults
          mkdir -p files/etc
          
          if [ ! -f files/etc/rc.local ]; then
            echo "# Put your custom commands here" > files/etc/rc.local
            echo "exit 0" >> files/etc/rc.local
          fi
          sed -i '/exit 0/i echo "WR3000G" > /tmp/sysinfo/model' files/etc/rc.local
          chmod +x files/etc/rc.local

          cat << "EOF" > files/etc/uci-defaults/99-factory-settings
          #!/bin/sh
          uci -q set wireless.radio0.country='RU'
          uci -q set wireless.radio1.country='RU'
          uci -q set wireless.default_radio0.ssid='OPENWRT-2.4G'
          uci -q set wireless.default_radio0.encryption='psk2'
          uci -q set wireless.default_radio0.key='9876543210'
          uci -q set wireless.default_radio1.ssid='OPENWRT-5G'
          uci -q set wireless.default_radio1.encryption='psk2'
          uci -q set wireless.default_radio1.key='9876543210'
          uci -q set wireless.radio0.disabled='0'
          uci -q set wireless.radio1.disabled='0'
          uci commit wireless
          
          printf "admin\nadmin\n" | passwd root
          exit 0
          EOF
          chmod +x files/etc/uci-defaults/99-factory-settings

      - name: Download BDF files
        working-directory: openwrt
        run: |
          mkdir -p files/lib/firmware/ath11k/IPQ5018/hw1.0 files/lib/firmware/ath11k/QCN6122/hw1.0
          curl -L -o files/lib/firmware/ath11k/IPQ5018/hw1.0/board-2.bin "https://github.com/openwrt/firmware_qca-wireless/raw/${{ env.BDF_COMMIT }}/board-cmcc_pz-l8.ipq5018"
          curl -L -o files/lib/firmware/ath11k/QCN6122/hw1.0/board-2.bin "https://github.com/openwrt/firmware_qca-wireless/raw/${{ env.BDF_COMMIT }}/board-cmcc_pz-l8.qcn6122"

      - name: Update feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ==========================================
      # 破除死循环的精准注入 + 熔断检测
      # ==========================================
      - name: Generate configuration & Fail-Fast Check
        working-directory: openwrt
        run: |
          cp "$GITHUB_WORKSPACE/variants/${{ matrix.mode_lower }}/${{ matrix.mode_lower }}.config" .config
          
          echo "=== 1. 精准注入插件 (不干预底层依赖，打破死循环) ==="
          {
            echo "CONFIG_PACKAGE_luci=y"
            echo "CONFIG_PACKAGE_luci-compat=y"
            echo "CONFIG_PACKAGE_podkop=y"
          } >> .config
          
          echo "=== 2. 依赖洗牌 (make defconfig) ==="
          make defconfig
          make defconfig
          
          echo "=== 3. 熔断检测 ==="
          if ! grep -q "CONFIG_PACKAGE_podkop=y" .config; then
            echo "========================================================"
            echo "🚨 编译已自动熔断！依然被删！"
            echo "========================================================"
            exit 1
          else
            echo "✅ 成功：[podkop] 已经通过依赖审查，钉死在固件中！"
          fi

      - name: Download sources
        working-directory: openwrt
        run: make download -j$(nproc) V=s

      - name: Build
        working-directory: openwrt
        run: make -j$(nproc) V=w

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ matrix.mode }}
          path: openwrt/bin/targets/qualcommax/ipq50xx/*
