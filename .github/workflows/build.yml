name: Build OpenWrt for CMCC PZ-L8

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for no release)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE: cmcc_pz-l8
  PR_21495_SHA: d4286eec1828e4843bceaccc400846854fa46955
  BDF_COMMIT: f7ad5fee1924efdb5d8b2d1bf95bd3867d22e701

jobs:
  build:
    name: Build ${{ matrix.mode }}
    runs-on: ubuntu-22.04
    timeout-minutes: 720
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: AP
            mode_lower: ap
          - mode: Router
            mode_lower: router

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3-distutils \
            python3-setuptools python3-dev rsync swig unzip \
            zlib1g-dev file wget curl jq device-tree-compiler \
            ccache libelf-dev libdw-dev libiberty-dev

      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: main
          path: openwrt
          fetch-depth: 0

      - name: Inject Local Podkop Plugin
        run: |
          # 提取你本地已上传的 Podkop 源码到编译目录
          cp -r $GITHUB_WORKSPACE/podkop openwrt/package/podkop
          echo "=== 成功将本地 Podkop 注入 ==="

      - name: "Merge PR #21495 and fix caldata"
        working-directory: openwrt
        run: |
          git config user.email "builder@github.com"
          git config user.name "GitHub Actions"
          git fetch origin ${{ env.PR_21495_SHA }}
          if ! git merge FETCH_HEAD --no-edit; then
            CALDATA=target/linux/qualcommax/ipq50xx/base-files/etc/hotplug.d/firmware/11-ath11k-caldata
            git checkout --ours "$CALDATA"
            git add "$CALDATA"
            git commit --no-edit --no-verify
          fi
          CALDATA=target/linux/qualcommax/ipq50xx/base-files/etc/hotplug.d/firmware/11-ath11k-caldata
          chmod +x "$GITHUB_WORKSPACE/.github/scripts/fix-caldata.sh"
          "$GITHUB_WORKSPACE/.github/scripts/fix-caldata.sh" "$CALDATA"

      - name: "Add FM25LS01 SPI NAND support (V2 hardware)"
        working-directory: openwrt
        run: |
          PATCH_DIR=target/linux/generic/backport-6.12
          PATCH_SRC="$GITHUB_WORKSPACE/patches/add-fm25ls01-support.patch"
          PATCH_DST="$PATCH_DIR/440-v6.12-mtd-spinand-add-support-for-FudanMicro-FM25LS01.patch"
          cp "$PATCH_SRC" "$PATCH_DST"

      - name: Download BDF files for PZ-L8 WiFi
        working-directory: openwrt
        run: |
          mkdir -p files/lib/firmware/ath11k/IPQ5018/hw1.0
          mkdir -p files/lib/firmware/ath11k/QCN6122/hw1.0
          curl -L -o files/lib/firmware/ath11k/IPQ5018/hw1.0/board-2.bin "https://github.com/openwrt/firmware_qca-wireless/raw/${{ env.BDF_COMMIT }}/board-cmcc_pz-l8.ipq5018"
          curl -L -o files/lib/firmware/ath11k/QCN6122/hw1.0/board-2.bin "https://github.com/openwrt/firmware_qca-wireless/raw/${{ env.BDF_COMMIT }}/board-cmcc_pz-l8.qcn6122"

      - name: Copy mode-specific overlay files
        run: |
          VARIANT_DIR="$GITHUB_WORKSPACE/variants/${{ matrix.mode_lower }}"
          if [ -d "$VARIANT_DIR/etc" ]; then
            cp -r "$VARIANT_DIR/etc" openwrt/files/
          fi

      - name: Inject Custom Settings (Our Customizations)
        working-directory: openwrt
        run: |
          echo "=== 开始注入自定义配置 ==="
          mkdir -p files/etc/uci-defaults
          
          # 安全追加型号伪装，防止覆盖原作者的 rc.local
          if [ ! -f files/etc/rc.local ]; then
            echo "# Put your custom commands here" > files/etc/rc.local
            echo "exit 0" >> files/etc/rc.local
          fi
          sed -i '/exit 0/i echo "WR3000G" > /tmp/sysinfo/model' files/etc/rc.local
          chmod +x files/etc/rc.local
          
          # 首次开机初始化脚本 (WiFi名称、密码、默认开启、160MHz)
          cat << "EOF" > files/etc/uci-defaults/99-custom-settings
          #!/bin/sh
          
          # 修改 radio0 (2.4G) 和 radio1 (5G) 的 SSID
          uci -q set wireless.default_radio0.ssid='OpenWrt-2.4G'
          uci -q set wireless.default_radio1.ssid='OpenWrt-5G'
          
          # 配置 Wi-Fi 加密方式为 WPA2-PSK 并设置默认无线密码
          uci -q set wireless.default_radio0.encryption='psk2'
          uci -q set wireless.default_radio0.key='9876543210'
          uci -q set wireless.default_radio1.encryption='psk2'
          uci -q set wireless.default_radio1.key='9876543210'
          
          # 默认开启 Wi-Fi 开关 (将 disabled 设为 0)
          uci -q set wireless.radio0.disabled='0'
          uci -q set wireless.radio1.disabled='0'
          
          # 强制 5G 使用 Wi-Fi 6 的 160MHz 频宽
          uci -q set wireless.radio1.htmode='HE160'
          
          uci commit wireless
          
          # 修改 root 默认密码为 admin
          printf "admin\nadmin\n" | passwd root
          
          exit 0
          EOF
          chmod +x files/etc/uci-defaults/99-custom-settings

      - name: Update and install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate configuration
        working-directory: openwrt
        run: |
          cp "$GITHUB_WORKSPACE/variants/${{ matrix.mode_lower }}/${{ matrix.mode_lower }}.config" .config
          make defconfig

      - name: Download sources
        working-directory: openwrt
        run: |
          for i in 1 2 3; do
            if make download -j$(nproc) V=s; then break; fi
            [ $i -eq 3 ] && exit 1
            sleep 30
          done

      - name: Build
        working-directory: openwrt
        run: make -j$(nproc) V=w || make -j1 V=w || make -j1 V=s

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ matrix.mode }}
          path: openwrt/bin/targets/qualcommax/ipq50xx/*
