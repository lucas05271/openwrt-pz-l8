name: Build OpenWrt for CMCC PZ-L8

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for no release)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE: cmcc_pz-l8
  PR_21495_SHA: d4286eec1828e4843bceaccc400846854fa46955
  BDF_COMMIT: f7ad5fee1924efdb5d8b2d1bf95bd3867d22e701

jobs:
  build:
    name: Build ${{ matrix.mode }}
    runs-on: ubuntu-22.04
    timeout-minutes: 720
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: AP
            mode_lower: ap
          - mode: Router
            mode_lower: router

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install dependencies & Podkop
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev python3-distutils python3-setuptools python3-dev rsync swig unzip zlib1g-dev file wget curl jq device-tree-compiler ccache libelf-dev libdw-dev libiberty-dev
          
          # Clone Podkop and Sing-box into package directory later (during checkout)

      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: main
          path: openwrt
          fetch-depth: 0

      - name: Inject Podkop Plugin Source
        working-directory: openwrt/package
        run: |
          git clone --depth 1 https://github.com/itdoginfo/luci-app-podkop.git luci-app-podkop
          
          git clone --depth 1 https://github.com/sbwml/openwrt_singbox.git sing-box
          
          echo "=== 成功将 Podkop 注入到固件编译系统 ==="
          
      - name: Checkout Podkop
        uses: actions/checkout@v4
        with:
          repository: itdoginfo/luci-app-podkop
          path: openwrt/package/luci-app-podkop
          
      - name: Checkout Sing-box
        uses: actions/checkout@v4
        with:
          repository: sbwml/openwrt_singbox
          path: openwrt/package/sing-box

      - name: "Merge PR #21495 and fix caldata"
        working-directory: openwrt
        run: |
          git config user.email "builder@github.com"
          git config user.name "GitHub Actions"
          git fetch origin ${{ env.PR_21495_SHA }}
          if ! git merge FETCH_HEAD --no-edit; then
            CALDATA=target/linux/qualcommax/ipq50xx/base-files/etc/hotplug.d/firmware/11-ath11k-caldata
            git checkout --ours "$CALDATA"
            git add "$CALDATA"
            git commit --no-edit --no-verify
          fi
          CALDATA=target/linux/qualcommax/ipq50xx/base-files/etc/hotplug.d/firmware/11-ath11k-caldata
          chmod +x "$GITHUB_WORKSPACE/.github/scripts/fix-caldata.sh"
          "$GITHUB_WORKSPACE/.github/scripts/fix-caldata.sh" "$CALDATA"

      - name: Download BDF files
        working-directory: openwrt
        run: |
          mkdir -p files/lib/firmware/ath11k/IPQ5018/hw1.0
          mkdir -p files/lib/firmware/ath11k/QCN6122/hw1.0
          curl -L -o files/lib/firmware/ath11k/IPQ5018/hw1.0/board-2.bin "https://github.com/openwrt/firmware_qca-wireless/raw/${{ env.BDF_COMMIT }}/board-cmcc_pz-l8.ipq5018"
          curl -L -o files/lib/firmware/ath11k/QCN6122/hw1.0/board-2.bin "https://github.com/openwrt/firmware_qca-wireless/raw/${{ env.BDF_COMMIT }}/board-cmcc_pz-l8.qcn6122"

      - name: Inject Custom Settings (rc.local & WiFi & Password)
        working-directory: openwrt
        run: |
          echo "=== 开始注入自定义配置 ==="
          mkdir -p files/etc/uci-defaults
          
          # 1. 注入本地启动脚本 (修改 rc.local)
          cat << "EOF" > files/etc/rc.local
          # Put your custom commands here that should be executed once
          # the system init finished. By default this file does nothing.

          echo "WR3000G" > /tmp/sysinfo/model
          exit 0
          EOF
          chmod +x files/etc/rc.local
          
          # 2. 注入首次开机初始化脚本 (修改 WiFi 名称、默认开启 Wi-Fi 与 root 密码)
          cat << "EOF" > files/etc/uci-defaults/99-custom-settings
          #!/bin/sh
          
          # 修改 radio0 (2.4G) 和 radio1 (5G) 的 SSID
          uci -q set wireless.default_radio0.ssid='OpenWrt-2.4G'
          uci -q set wireless.default_radio1.ssid='OpenWrt-5G'
          
          # 默认开启 Wi-Fi 开关 (将 disabled 设为 0)
          uci -q set wireless.radio0.disabled='0'
          uci -q set wireless.radio1.disabled='0'
          uci commit wireless
          
          # 修改 root 默认密码为 admin（自动模拟两次输入密码确认）
          printf "admin\nadmin\n" | passwd root
          
          exit 0
          EOF
          chmod +x files/etc/uci-defaults/99-custom-settings
          echo "=== 自定义配置注入完成 ==="

      - name: Update and install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate configuration
        working-directory: openwrt
        run: |
          cp "$GITHUB_WORKSPACE/${{ matrix.mode_lower }}/${{ matrix.mode_lower }}.config" .config
          make defconfig

      - name: Build
        working-directory: openwrt
        run: make -j$(nproc) V=w

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ matrix.mode }}
          path: openwrt/bin/targets/qualcommax/ipq50xx/*
