name: Build OpenWrt for CMCC PZ-L8

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (leave empty for no release)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET: qualcommax
  SUBTARGET: ipq50xx
  DEVICE: cmcc_pz-l8
  PR_21495_SHA: d4286eec1828e4843bceaccc400846854fa46955
  BDF_COMMIT: f7ad5fee1924efdb5d8b2d1bf95bd3867d22e701

jobs:
  build:
    name: Build ${{ matrix.mode }}
    runs-on: ubuntu-22.04
    timeout-minutes: 720
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: AP
            mode_lower: ap
          - mode: Router
            mode_lower: router

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses-dev libssl-dev python3-distutils \
            python3-setuptools python3-dev rsync swig unzip \
            zlib1g-dev file wget curl jq device-tree-compiler \
            ccache libelf-dev libdw-dev libiberty-dev

      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: main
          path: openwrt
          fetch-depth: 0

      - name: Inject Local Podkop Plugin & Sing-box
        run: |
          # 提取你本地已上传的 Podkop 源码到编译目录
          cp -r $GITHUB_WORKSPACE/podkop openwrt/package/podkop
          echo "=== 成功将本地 Podkop 注入 ==="

      - name: Checkout Sing-box
        uses: actions/checkout@v4
        with:
          repository: sbwml/openwrt_singbox
          path: openwrt/package/sing-box

      - name: "Merge PR #21495 and fix caldata"
        working-directory: openwrt
        run: |
          git config user.email "builder@github.com"
          git config user.name "GitHub Actions"
          git fetch origin ${{ env.PR_21495_SHA }}
          if ! git merge FETCH_HEAD --no-edit; then
            CALDATA=target/linux/qualcommax/ipq50xx/base-files/etc/hotplug.d/firmware/11-ath11k-caldata
            git checkout --ours "$CALDATA"
            git add "$CALDATA"
            git commit --no-edit --no-verify
          fi
          CALDATA=target/linux/qualcommax/ipq50xx/base-files/etc/hotplug.d/firmware/11-ath11k-caldata
          chmod +x "$GITHUB_WORKSPACE/scripts/fix-caldata.sh"
          "$GITHUB_WORKSPACE/scripts/fix-caldata.sh" "$CALDATA"

